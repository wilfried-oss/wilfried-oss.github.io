    <script>
        $(function () {
            $("form").on("submit", function (e) {
                e.preventDefault();
                let email = $('input[name="email"]').val();
                let pseudo = $('input[name="pseudo"]').val();
                let age = $('input[name="age"]').val();

                let user = { email, pseudo, age };

                const users = getUsers();
                users.push(user);
                displayUsers(users);
                $("#form")[0].reset();

                localStorage.setItem("users", JSON.stringify(users));
            });

            const users = getUsers();
            displayUsers(users);

            $('#search').on('keyup', function () {
                const users = getUsers();
                $('#search').on('keyup', function () {
                    let searchValue = $(this).val().toLowerCase();
                    $('#search-results').empty();
                    for (let i = 0; i < users.length; i++) {
                        let userPseudo = users[i]['pseudo'].toLowerCase();
                        if (userPseudo.includes(searchValue)) {
                            $('#search-results').append(`<li>${users[i]['pseudo']}</li>`);
                        }
                    }
                });
            });

            function getUsers() {
                const usersJSON = localStorage.getItem("users");
                return JSON.parse(usersJSON) || [];
            }
            function displayUsers(users) {
                $("#usersList").empty();
                users.forEach((element, range) => {
                    const ul = $(`
                        <h6>${range + 1}</h6>
                        <ul class="list-star">
                            <li>Pseudo: ${element.pseudo}</li>
                            <li>Mail: ${element.email}</li>
                            <li>Age: ${element.age} ans</li>
                        </ul>         
                    `);
                    $("#usersList").append(ul);
                });
            }
        });
    </script>
