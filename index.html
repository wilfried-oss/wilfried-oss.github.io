    <script>
        $(document).ready(function () {
            var tempsRestant = 90;
            var score = 0;
            var intervalId;
            var jeuDemarre = false; // Variable pour vérifier si le jeu a démarré

            function mettreAJourTemps() {
                $("#temps").text(tempsRestant);
            }

            function mettreAJourScore() {
                $("#score").text("SCORE : " + score);
            }

            function demarrerJeu() {
                jeuDemarre = true; // Marquer que le jeu a démarré
                intervalId = setInterval(function () {
                    tempsRestant--;
                    mettreAJourTemps();

                    if (tempsRestant <= 0) {
                        clearInterval(intervalId);
                        var audioElement = document.getElementById('audio');
                        audioElement.setAttribute('autoplay', 'autoplay');
                        $("#message_alerte").html('<div class="alert alert-success">SCORE  : ' + score + '</div>');
                        $("#lettres button").attr("disabled", "disabled");
                        $('#mot').hide();
                        $("#restart").attr("disabled", false); // Réactiver le bouton "Restart"
                    }
                }, 1000);
            }

            var mots = ["CHAT", "CHIEN", "ORDINATEUR", "CHEMISE", "BASKET", "LIVRE", "TABLE", "PAPIER", "FRAISE", "TRAIN", "INFORMATIQUE", "CHAISE", "CLAVIER", "SOURIS", "SUCRE", "AVION", "PLANTE", "BANANE", "CRAYON", "MOTO", "FOOTBALL", "BASKETBALL", "PHOTO", "RADIO", "JEU"];
            var mot, lettres, erreurs, lettresDevinees;

            function initialiserJeu() {
                clearInterval(intervalId); // Ajoutez cette ligne pour arrêter tout intervalle existant
                mot = mots[Math.floor(Math.random() * mots.length)];
                lettres = mot.split("");
                erreurs = 0;
                lettresDevinees = [];

                for (var i = 0; i < lettres.length; i++) {
                    lettresDevinees[i] = "_";
                }

                $("#mot").html(lettresDevinees.join(" "));
                $("#lettres button").attr("disabled", false);
                mettreAJourScore();
                demarrerJeu();
            }

            function mettreAJourMotAffiche() {
                $("#mot").html(lettresDevinees.join(" "));
            }

            var alphabet = "AZERTYUIOPQSDFGHJKLMWXCVBN".split("");

            for (var i = 0; i < alphabet.length; i++) {
                var lettre = $("<button>").text(alphabet[i]).attr("id", alphabet[i]);
                lettre.click(function () {
                    if (jeuDemarre) { // Vérifier si le jeu a démarré avant de traiter les lettres
                        var lettreSelectionnee = $(this).attr("id");
                        var trouve = false;

                        for (var i = 0; i < lettres.length; i++) {
                            if (lettres[i] === lettreSelectionnee) {
                                lettresDevinees[i] = lettreSelectionnee;
                                trouve = true;
                            }
                        }

                        if (!trouve) {
                            erreurs++;
                            mettreAJourTemps();
                        }

                        $(this).attr("disabled", "disabled");
                        mettreAJourMotAffiche();

                        if (lettresDevinees.join("") === mot) {
                            score += 6;
                            mettreAJourScore();
                            initialiserJeu();
                        }
                    }
                });

                $("#lettres").append(lettre);
            }

            $("#demarrer").click(function () {
                tempsRestant = 90; // Réinitialise le temps restant
                initialiserJeu();
                $("#message_alerte").empty();
                $("#demarrer").attr("disabled", "disabled");
                $("#restart").attr("disabled", "disabled");
            });

            $("#restart").click(function () {
                location.reload();
            });

        });

    </script>
